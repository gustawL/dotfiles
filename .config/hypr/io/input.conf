# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = pl
    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -> 0 means no modification.
    # defaults: -1.0 - 1.0 
}

cursor {
    inactive_timeout = 1
}

general {
    # in hide cursor after x sec of inactivity
    cursor_inactive_timeout = 1
}